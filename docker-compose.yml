version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: souplesse
      POSTGRES_PASSWORD: souplesse_dev
      POSTGRES_DB: souplesse_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U souplesse -d souplesse_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
